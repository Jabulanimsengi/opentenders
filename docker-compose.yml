version: '3.8'

services:
  typesense:
    image: typesense/typesense:27.1
    container_name: tenderapp-typesense
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=tender-app-typesense-key --enable-cors'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  typesense-data:
